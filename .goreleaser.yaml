# GoReleaser configuration for fingerprintproxy
# See https://goreleaser.com/customization/ for details

project_name: fingerprintproxy

version: 2

before:
  hooks:
    - go mod download

builds:
  - id: fingerprintproxy
    main: .
    binary: fingerprintproxy
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    checksum: true
    signature: true
    fingerprint: {{ .Env.GPG_FINGERPRINT }}

checksums:
  - algorithm: sha256
    signature: true
    fingerprint: {{ .Env.GPG_FINGERPRINT }}

signs:
  - artifact: checksum
    cmd: gpg2
    args:
      - "--batch"
      - "-u"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

snapshot:
  name_template: "{{ .Tag }}-next"

announce:
  twitter:
    enabled: false
  slack:
    enabled: false

# For GitHub Releases
release:
  github:
    enabled: true
    owner: "{{ .Env.GITHUB_REPOSITORY_OWNER }}"
    name: "{{ .Env.GITHUB_REPOSITORY }}"
